<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Predictor Ultra Pro</title>
    <style>
        :root {
            --primary-gold: #ffb400;
            --bg-dark: #0f0f0f;
            --card-bg: #1a1a1a;
            --input-bg: #252525;
            --accent-blue: #00f2ff;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .predictor-card {
            background: var(--card-bg);
            width: 360px;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 0 30px rgba(255, 180, 0, 0.1);
            border: 1px solid #333;
            text-align: center;
        }

        .live-clock {
            background: #000;
            padding: 15px;
            border-radius: 15px;
            font-size: 2.2rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 2px;
            margin-bottom: 20px;
            border: 1px solid #444;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .label {
            font-size: 10px;
            color: #777;
            text-transform: uppercase;
            font-weight: bold;
        }

        .auto-btn {
            background: transparent;
            border: 1px solid var(--primary-gold);
            color: var(--primary-gold);
            font-size: 9px;
            padding: 2px 8px;
            border-radius: 5px;
            cursor: pointer;
        }

        .input-box {
            background: var(--input-bg);
            border: 1px solid #3d3d3d;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 15px;
        }

        input {
            background: transparent;
            border: none;
            color: var(--primary-gold);
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            width: 100%;
            outline: none;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-main {
            background: linear-gradient(to bottom, #ffcc00, #ff9900);
            color: black;
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: none;
            font-weight: 900;
            font-size: 1rem;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 153, 0, 0.4);
            transition: 0.2s;
        }

        .btn-main:active { transform: scale(0.96); }

        .result-panel {
            margin-top: 25px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 20px;
            border: 1px dashed #444;
        }

        .res-time {
            font-size: 2.3rem;
            color: var(--primary-gold);
            font-weight: bold;
            margin: 10px 0;
        }

        .mults {
            display: flex;
            justify-content: space-around;
            font-weight: 800;
            font-size: 1.1rem;
        }

        .status-msg {
            font-size: 11px;
            color: #555;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="predictor-card">
    <div class="live-clock" id="clock">00:00:00</div>

    <div class="label-row">
        <span class="label">Dernier Multiplicateur</span>
    </div>
    <div class="input-box">
        <input type="number" id="lastMult" step="0.01" value="1.36">
    </div>

    <div class="label-row">
        <span class="label">V1 - V2 - V3 Data</span>
        <button class="auto-btn" onclick="autoFill()">AUTO-GENERATE</button>
    </div>
    <div class="grid-3">
        <div class="input-box" style="margin-bottom:0"><input type="number" id="v1" placeholder="V1"></div>
        <div class="input-box" style="margin-bottom:0"><input type="number" id="v2" placeholder="V2"></div>
        <div class="input-box" style="margin-bottom:0"><input type="number" id="v3" placeholder="V3"></div>
    </div>

    <button class="btn-main" onclick="runProCalc()">Calculer la Prédiction</button>

    <div class="result-panel">
        <span class="label" style="color:#aaa">Prochain Signal</span>
        <div class="res-time" id="resTime">--:--:--</div>
        <div class="mults">
            <span style="color:var(--accent-blue)" id="m1">x--</span>
            <span style="color:var(--primary-gold)" id="m2">x--</span>
            <span style="color:red" id="m3">x--</span>
        </div>
    </div>
    <div class="status-msg">DATABASE: CONNECTED | ALGO: ACTIVE</div>
</div>

<script>
    // 1. Ora velona
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR');
    }, 1000);

    // 2. Auto-Fill Function (Fandaharana ho azy)
    function autoFill() {
        const now = new Date();
        document.getElementById('v1').value = Math.floor(Math.random() * 500) + 100;
        document.getElementById('v2').value = now.getSeconds() * 7;
        document.getElementById('v3').value = now.getMinutes() + 200;
        playBeep(400, 0.1);
    }

    // 3. Pro Prediction Logic
    function runProCalc() {
        const btn = document.querySelector('.btn-main');
        btn.innerText = "Analyse en cours...";
        btn.disabled = true;
        playBeep(600, 0.2);

        setTimeout(() => {
            const now = new Date();
            // Ampiana 2-5 minitra ho an'ny signal
            now.setMinutes(now.getMinutes() + Math.floor(Math.random() * 4) + 2);
            document.getElementById('resTime').innerText = now.toLocaleTimeString('fr-FR');

            // Multipliers
            document.getElementById('m1').innerText = "x" + (1.1 + Math.random() * 0.4).toFixed(1);
            document.getElementById('m2').innerText = "x" + (1.6 + Math.random() * 1.2).toFixed(1);
            document.getElementById('m3').innerText = "x" + (4.0 + Math.random() * 8.0).toFixed(1);

            btn.innerText = "Calculer la Prédiction";
            btn.disabled = false;
            playBeep(800, 0.3);
        }, 1500);
    }

    // Feo (Simple Beep)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep(freq, dur) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start();
        osc.stop(audioCtx.currentTime + dur);
    }
</script>

</body>
</html>
