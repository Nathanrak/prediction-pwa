<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction App - GitHub</title>
    <style>
        /* CSS tsotra mba hampivoaka ny endriny */
        body {
            background-color: #000; /* Mainty ny lamosina */
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background-color: #1a1a1a;
            padding: 20px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
        }
        .timer, .input-main, .grid-box {
            background-color: #262626;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #444;
        }
        .yellow-text { color: #ffcc00; font-weight: bold; font-size: 1.2rem; }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        
        input {
            width: 80%;
            background: transparent;
            border: none;
            color: #ffcc00;
            text-align: center;
            font-size: 1rem;
        }

        button {
            background-color: #ffcc00; /* Mavo ny bokotra */
            color: black;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .result-section {
            margin-top: 20px;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="timer">14:59:12</div>

    <div class="input-main">
        <input type="text" value="1.50">
    </div>

    <div class="grid-container">
        <div class="grid-box"><input type="number" value="151"></div>
        <div class="grid-box"><input type="number" value="379"></div>
        <div class="grid-box"><input type="number" value="402"></div>
    </div>

    <button onclick="alert('Manao kajy...')">CALCULER LA PRÉDICTION</button>

    <div class="result-section">
        <p style="font-size: 0.8rem; color: #888;">PROCHAIN</p>
        <div class="yellow-text" style="font-size: 1.8rem;">15:05:42</div>
        
        <div class="grid-container" style="margin-top: 10px;">
            <div style="color: #00ffcc;">x0.8</div>
            <div style="color: #ffcc00;">x2</div>
            <div style="color: #ff4d4d;">x5</div>
        </div>
    </div>
</div>

</body>
</html>
