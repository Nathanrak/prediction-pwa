<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Predictor Pro - GitHub Edition</title>
    <style>
        :root {
            --primary-yellow: #ffb400;
            --bg-dark: #121212;
            --input-bg: #262626;
            --text-gray: #7a7a7a;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .app-container {
            background: #1a1a1a;
            width: 380px;
            padding: 30px;
            border-radius: 35px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            border: 1px solid #333;
        }

        /* Ny famantaranandro eo ambony */
        .clock-header {
            background: #000;
            padding: 20px;
            border-radius: 20px;
            font-size: 2.8rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 2px;
            border: 1px solid #444;
        }

        .label {
            font-size: 11px;
            color: var(--text-gray);
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
            font-weight: bold;
        }

        .input-field {
            background: var(--input-bg);
            border: 1px solid #3d3d3d;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 25px;
            text-align: center;
        }

        input {
            background: transparent;
            border: none;
            color: var(--primary-yellow);
            font-size: 1.5rem;
            font-weight: 800;
            text-align: center;
            width: 100%;
            outline: none;
        }

        .row-data {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .auto-btn {
            background: transparent;
            border: 1px solid var(--primary-yellow);
            color: var(--primary-yellow);
            font-size: 10px;
            padding: 3px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        .grid-v {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .v-box {
            background: var(--input-bg);
            border: 1px solid #3d3d3d;
            border-radius: 15px;
            padding: 15px;
        }

        /* Ny bokotra mavo lehibe */
        .btn-predict {
            background: linear-gradient(180deg, #ffcc00 0%, #ff9900 100%);
            color: #000;
            width: 100%;
            padding: 22px;
            border-radius: 20px;
            border: none;
            font-size: 1.3rem;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 10px 25px rgba(255, 153, 0, 0.4);
            margin-bottom: 35px;
        }

        /* Ny valiny (Result) */
        .result-panel {
            border: 2px dashed #333;
            border-radius: 30px;
            padding: 25px;
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
        }

        .res-time {
            font-size: 3rem;
            color: var(--primary-yellow);
            font-weight: 800;
            margin: 15px 0;
            text-shadow: 0 0 20px rgba(255, 180, 0, 0.4);
        }

        .mult-row {
            display: flex;
            justify-content: space-around;
            font-size: 1.4rem;
            font-weight: 900;
        }

        .db-status {
            font-size: 10px;
            color: #444;
            text-align: center;
            margin-top: 20px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="clock-header" id="liveClock">00:00:00</div>

    <span class="label">Dernier Multiplicateur</span>
    <div class="input-field">
        <input type="number" id="lastM" step="0.01" value="1.36">
    </div>

    <div class="row-data">
        <span class="label">V1 - V2 - V3 DATA (Round ID)</span>
        <button class="auto-btn" onclick="generateRoundData()">AUTO-GENERATE</button>
    </div>
    <div class="grid-v">
        <div class="v-box"><input type="number" id="v1" placeholder="V1"></div>
        <div class="v-box"><input type="number" id="v2" placeholder="V2"></div>
        <div class="v-box"><input type="number" id="v3" placeholder="V3"></div>
    </div>

    <button class="btn-predict" onclick="calculate()">Calculer la Prédiction</button>

    <div class="result-panel">
        <span class="label" style="color: #666;">Prochain Signal</span>
        <div class="res-time" id="resTime">--:--:--</div>
        <div class="mult-row">
            <span style="color: #00f2ff;" id="x1">x--</span>
            <span style="color: #ffb400;" id="x2">x--</span>
            <span style="color: #ff3c3c;" id="x3">x--</span>
        </div>
    </div>

    <div class="db-status">DATABASE: CONNECTED | ALGO: ROUND-ID ANALYSIS</div>
</div>

<script>
    // 1. Mampandeha ny ora (Clock)
    setInterval(() => {
        document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('fr-FR');
    }, 1000);

    // 2. Logic hamenoana ny V1, V2, V3 ho azy (Round ID Sim)
    function generateRoundData() {
        // Maka tarehimarika 3 kisendrasendra hoatry ny Round ID
        document.getElementById('v1').value = Math.floor(Math.random() * 900) + 100;
        document.getElementById('v2').value = Math.floor(Math.random() * 900) + 100;
        document.getElementById('v3').value = Math.floor(Math.random() * 900) + 100;
    }

    // 3. Logic hikajiana ny valiny (Calcul)
    function calculate() {
        const btn = document.querySelector('.btn-predict');
        btn.innerText = "Analyse...";
        btn.disabled = true;

        setTimeout(() => {
            const now = new Date();
            // Ampiana 2 ka hatramin'ny 5 minitra ny ora izao
            const minutesToAdd = Math.floor(Math.random() * 4) + 2;
            now.setMinutes(now.getMinutes() + minutesToAdd);
            
            document.getElementById('resTime').innerText = now.toLocaleTimeString('fr-FR');

            // Kajy ny multiplier
            document.getElementById('x1').innerText = "x" + (1.1 + Math.random() * 0.4).toFixed(1);
            document.getElementById('x2').innerText = "x" + (1.8 + Math.random() * 1.5).toFixed(1);
            document.getElementById('x3').innerText = "x" + (5.0 + Math.random() * 10).toFixed(1);

            btn.innerText = "Calculer la Prédiction";
            btn.disabled = false;
        }, 1500);
    }
</script>

</body>
</html>
