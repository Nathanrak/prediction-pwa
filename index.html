<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Analytics Pro - Dashboard</title>
    <style>
        /* --- CSS: ENDRIKA SY LOKO (PROFESSIONAL DARK) --- */
        :root {
            --gold: #c19a6b;
            --bg-dark: #05070a;
            --panel-bg: #0f1218;
            --green-neon: #00ffcc;
            --red-neon: #ff4444;
            --text-grey: #8b949e;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .dashboard-container {
            width: 340px;
            background: var(--panel-bg);
            border: 1px solid var(--gold);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
            border-top: 4px solid var(--gold);
        }

        .header {
            text-align: center;
            border-bottom: 1px solid #30363d;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.2rem;
            color: var(--gold);
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .session-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-grey);
            margin-bottom: 15px;
        }

        /* Main Prediction Display */
        .prediction-box {
            background: #161b22;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
            border-left: 5px solid var(--green-neon);
            position: relative;
        }

        .prediction-box .label {
            font-size: 0.7rem;
            color: var(--text-grey);
            margin-bottom: 5px;
        }

        #main-prediction {
            font-size: 3.2rem;
            font-weight: bold;
            color: var(--green-neon);
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
            margin: 5px 0;
        }

        #prediction-time {
            font-size: 0.85rem;
            color: var(--gold);
            font-weight: bold;
        }

        /* Stats Grid (Base, Moyenne, Risque) */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }

        .stat-card {
            background: #0d1117;
            padding: 10px 5px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #30363d;
        }

        .stat-card span {
            display: block;
        }

        .stat-label {
            font-size: 0.65rem;
            color: var(--text-grey);
            margin-bottom: 4px;
        }

        .stat-val {
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--gold);
        }

        /* History Slots (6 Numbers) */
        .history-section {
            margin-bottom: 20px;
        }

        .history-label {
            font-size: 0.75rem;
            color: var(--text-grey);
            margin-bottom: 8px;
            display: block;
        }

        .slots-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .slot {
            background: #010409;
            border: 1px dashed #30363d;
            padding: 8px;
            border-radius: 5px;
            text-align: center;
            font-size: 0.9rem;
            color: #5bc0de;
        }

        /* Buttons */
        .tour-btns {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-tsara {
            background: rgba(0, 255, 204, 0.1);
            color: var(--green-neon);
            border: 1px solid var(--green-neon);
        }

        .btn-ratsy {
            background: rgba(255, 68, 68, 0.1);
            color: var(--red-neon);
            border: 1px solid var(--red-neon);
        }

        .btn-analyze {
            width: 100%;
            padding: 15px;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-analyze:hover {
            filter: brightness(1.1);
        }

        .btn-analyze:disabled {
            background: #444;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header">
            <h1>ANALYTICS BANK</h1>
        </div>

        <div class="session-info">
            <span>DEPART: <b id="start-time">00:00:00</b></span>
            <span>STATUS: <b id="status-text" style="color:var(--green-neon)">ACTIVE</b></span>
        </div>

        <div class="prediction-box" id="prediction-ui">
            <div class="label">NEXT PREDICTION AT: <span id="prediction-time">--:--:--</span></div>
            <div id="main-prediction">0.00x</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">C. BASE</span>
                <span class="stat-val" id="val-base">--</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">C. MOYENNE</span>
                <span class="stat-val" id="val-moy">--</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">C. RISQUE</span>
                <span class="stat-val" id="val-risque">--</span>
            </div>
        </div>

        <div class="history-section">
            <span class="history-label">LAST 6 MULTIPLIERS:</span>
            <div class="slots-container" id="history-slots">
                <div class="slot">--</div><div class="slot">--</div>
                <div class="slot">--</div><div class="slot">--</div>
                <div class="slot">--</div><div class="slot">--</div>
            </div>
        </div>

        <div class="tour-btns">
            <button class="btn btn-tsara" onclick="setTour('tsara')">TOUR TSARA</button>
            <button class="btn btn-ratsy" onclick="setTour('ratsy')">TOUR RATSY</button>
        </div>

        <button class="btn-analyze" id="analyze-trigger">Analyze Trend</button>
    </div>

    <script>
        /* --- JAVASCRIPT: LOGIC SY KAJY --- */
        document.addEventListener('DOMContentLoaded', () => {
            const startTime = document.getElementById('start-time');
            const analyzeBtn = document.getElementById('analyze-trigger');
            const mainPred = document.getElementById('main-prediction');
            const predTime = document.getElementById('prediction-time');
            const slots = document.querySelectorAll('.slot');

            // 1. Ora nanombohana
            startTime.innerText = new Date().toLocaleTimeString();

            // 2. Function Analyze
            analyzeBtn.addEventListener('click', () => {
                analyzeBtn.disabled = true;
                analyzeBtn.innerText = "CALCULATING...";

                setTimeout(() => {
                    // Simulation an'ny isa 6 farany (Decimal 2)
                    slots.forEach(slot => {
                        let rand = (Math.random() * (3.0 - 1.0) + 1.0).toFixed(2);
                        slot.innerText = rand + "x";
                    });

                    // Kajy Prediction (Logic Bank)
                    let now = new Date();
                    now.setSeconds(now.getSeconds() + 45); // Prediction ho an'ny 45s manaraka
                    predTime.innerText = now.toLocaleTimeString();

                    let base = (Math.random() * (1.45 - 1.10) + 1.10).toFixed(2);
                    let moy = (Math.random() * (2.80 - 1.60) + 1.60).toFixed(2);
                    let risq = (Math.random() * (12.0 - 4.5) + 4.5).toFixed(2);

                    document.getElementById('val-base').innerText = base + "x";
                    document.getElementById('val-moy').innerText = moy + "x";
                    document.getElementById('val-risque').innerText = risq + "x";
                    
                    // Ny Moyenne no aseho mibaribary
                    mainPred.innerText = moy + "x";

                    analyzeBtn.disabled = false;
                    analyzeBtn.innerText = "Analyze Trend";
                }, 1200);
            });
        });

        // 3. Tour Indicator Logic
        function setTour(type) {
            const uiBox = document.getElementById('prediction-ui');
            const status = document.getElementById('status-text');
            
            if(type === 'tsara') {
                uiBox.style.borderLeftColor = "#00ffcc";
                status.innerText = "FAVORABLE";
                status.style.color = "#00ffcc";
            } else {
                uiBox.style.borderLeftColor = "#ff4444";
                status.innerText = "RISKY";
                status.style.color = "#ff4444";
            }
        }
    </script>
</body>
</html>
