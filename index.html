<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator HEX Predictor Pro</title>
    <style>
        /* CSS mampiely ny endrika Pro */
        :root {
            --primary-gold: #ffb400;
            --bg-dark: #0a0a0a;
            --card-bg: #151515;
            --input-bg: #222222;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .predictor-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 380px;
            padding: 30px;
            border-radius: 35px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.9);
            border: 1px solid #2a2a2a;
        }

        .live-clock {
            background: #000;
            padding: 20px;
            border-radius: 20px;
            font-size: 2.8rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 30px;
            border: 1px solid #333;
            letter-spacing: 2px;
            box-shadow: inset 0 0 15px rgba(255,255,255,0.05);
        }

        .label {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 8px;
            display: block;
            text-align: left;
        }

        .input-box {
            background: var(--input-bg);
            border: 1px solid #333;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }

        input {
            background: transparent;
            border: none;
            color: var(--primary-gold);
            font-size: 1.5rem;
            font-weight: 800;
            width: 100%;
            text-align: center;
            outline: none;
        }

        .btn-main {
            background: linear-gradient(180deg, #ffcc00 0%, #ff8800 100%);
            color: black;
            width: 100%;
            padding: 22px;
            border-radius: 20px;
            border: none;
            font-weight: 900;
            font-size: 1.2rem;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 136, 0, 0.4);
            margin-bottom: 30px;
            transition: transform 0.2s;
        }

        .btn-main:active { transform: scale(0.96); }

        .result-panel {
            background: rgba(255,255,255,0.02);
            border: 1px dashed #444;
            border-radius: 30px;
            padding: 25px;
            text-align: center;
        }

        .res-time {
            font-size: 3rem;
            color: var(--primary-gold);
            font-weight: 900;
            margin: 10px 0;
            text-shadow: 0 0 20px rgba(255, 180, 0, 0.5);
        }

        .mult-row {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            font-weight: 900;
            font-size: 1.5rem;
        }

        .footer-status {
            font-size: 10px;
            color: #333;
            text-align: center;
            margin-top: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="predictor-card">
    <div class="live-clock" id="clock">00:00:00</div>

    <span class="label">Dernier Multiplicateur</span>
    <div class="input-box">
        <input type="number" id="lastM" step="0.01" value="1.36">
    </div>

    <span class="label">HEX Data Analysis (Chiffres)</span>
    <div class="input-box">
        <input type="number" id="hexData" placeholder="Ex: 849201">
    </div>

    <button class="btn-main" onclick="runAnalysis()">Calculer la Prédiction</button>

    <div class="result-panel">
        <span class="label" style="text-align: center;">Prochain Signal</span>
        <div class="res-time" id="resTime">--:--:--</div>
        
        <div class="mult-row">
            <span style="color:#00f2ff" id="x1">x1.1</span>
            <span style="color:var(--primary-gold)" id="x2">x1.8</span>
            <span style="color:#ff3c3c" id="x3">x6.3</span>
        </div>
    </div>

    <div class="footer-status">ALGORITHM: HEX-CHIFRE | STATUS: ENCRYPTED</div>
</div>

<script>
    // 1. Mampandeha ny famantaranandro (Digital Clock)
    setInterval(() => {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('fr-FR');
    }, 1000);

    // 2. Lojika hikajiana ny Prediction
    function runAnalysis() {
        const btn = document.querySelector('.btn-main');
        const hexInput = document.getElementById('hexData');
        
        // Raha tsy nameno ny HEX ianao dia mameno ho azy ny programa
        if (!hexInput.value) {
            hexInput.value = Math.floor(Math.random() * 900000) + 100000;
        }

        btn.innerText = "HEX ANALYSING...";
        btn.disabled = true;

        setTimeout(() => {
            const now = new Date();
            // Lojika: manampy 2 ka hatramin'ny 6 minitra ny ora izao
            const randomWait = Math.floor(Math.random() * 5) + 2;
            now.setMinutes(now.getMinutes() + randomWait);
            
            // Mampiseho ny ora manaraka (Signal)
            document.getElementById('resTime').innerText = now.toLocaleTimeString('fr-FR');

            // Mampiseho ny Multipliers kisendrasendra
            document.getElementById('x1').innerText = "x" + (1.0 + Math.random() * 0.4).toFixed(1);
            document.getElementById('x2').innerText = "x" + (1.6 + Math.random() * 1.4).toFixed(1);
            document.getElementById('x3').innerText = "x" + (4.0 + Math.random() * 9.0).toFixed(1);

            btn.innerText = "Calculer la Prédiction";
            btn.disabled = false;
        }, 1800);
    }
</script>

</body>
</html>
