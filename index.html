<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Prediction Tool</title>
    <style>
        :root {
            --primary-yellow: #ffcc00;
            --bg-dark: #0f0f0f;
            --card-bg: #1e1e1e;
            --input-bg: #2b2b2b;
            --text-gray: #a0a0a0;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .app-container {
            background: var(--card-bg);
            width: 350px;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        .header-timer {
            background: var(--input-bg);
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            font-size: 1.4rem;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 20px;
            border: 1px solid #444;
        }

        .input-group { margin-bottom: 15px; }

        label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-gray);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            background: var(--input-bg);
            border: 1.5px solid #444;
            border-radius: 10px;
            padding: 12px;
            color: var(--primary-yellow);
            font-size: 1.1rem;
            text-align: center;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-yellow);
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.2);
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .predict-btn {
            background: linear-gradient(135deg, #ffcc00, #ffaa00);
            color: #000;
            width: 100%;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .predict-btn:active { transform: scale(0.98); }

        .result-panel {
            margin-top: 25px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 18px;
            border: 1px dashed #444;
            text-align: center;
        }

        .result-time {
            font-size: 2rem;
            color: var(--primary-yellow);
            margin: 10px 0;
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
        }

        .multipliers {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
        }

        .mult { font-weight: bold; font-size: 1.1rem; }
        .green { color: #00ffcc; }
        .yellow { color: #ffcc00; }
        .red { color: #ff4d4d; }

        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-timer" id="clock">00:00:00</div>

    <div class="input-group">
        <label>Dernier Multiplicateur</label>
        <input type="number" step="0.01" value="1.50">
    </div>

    <div class="grid-inputs">
        <div><label>V1</label><input type="number" value="151"></div>
        <div><label>V2</label><input type="number" value="379"></div>
        <div><label>V3</label><input type="number" value="402"></div>
    </div>

    <button class="predict-btn" onclick="startPrediction()">CALCULER LA PRÉDICTION</button>

    <div class="result-panel">
        <label>Prochain Signal</label>
        <div class="result-time" id="resultTime">--:--:--</div>
        
        <div class="multipliers">
            <div class="mult green" id="m1">x0.0</div>
            <div class="mult yellow" id="m2">x0.0</div>
            <div class="mult red" id="m3">x0.0</div>
        </div>
    </div>
</div>

<script>
    // 1. Mampandeha ny ora (Clock)
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString();
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 2. Logic ho an'ny Prediction
    function startPrediction() {
        const btn = document.querySelector('.predict-btn');
        const resTime = document.getElementById('resultTime');
        
        btn.innerText = "CALCUL EN COURS";
        btn.classList.add('loading-dots');
        btn.disabled = true;

        setTimeout(() => {
            // Mamorona ora kisendrasendra (prediction)
            const future = new Date();
            future.setMinutes(future.getMinutes() + Math.floor(Math.random() * 5) + 1);
            resTime.innerText = future.toLocaleTimeString();

            // Mamorona multipliers kisendrasendra
            document.getElementById('m1').innerText = "x" + (Math.random() * 1.5).toFixed(1);
            document.getElementById('m2').innerText = "x" + (Math.random() * 3 + 1.5).toFixed(1);
            document.getElementById('m3').innerText = "x" + (Math.random() * 10 + 5).toFixed(1);

            btn.innerText = "CALCULER LA PRÉDICTION";
            btn.classList.remove('loading-dots');
            btn.disabled = false;
        }, 2000); // Miandry 2 segondra vao mipoitra ny valiny
    }
</script>

</body>
</html>
