<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blizzard-Imperial Predict Pro</title>
    <style>
        /* --- CSS VOALOHANY (TSY NIOVA) --- */
        :root {
            --dark-bg: #0d1117;
            --card-bg: #161b22;
            --input-bg: #0d1117;
            --accent-yellow: #f1c40f;
            --accent-cyan: #00d2ff;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .brand { display: flex; align-items: center; gap: 12px; }
        .diamond-icon {
            width: 12px; height: 12px;
            border: 2px solid var(--accent-yellow);
            transform: rotate(45deg);
        }

        .brand-text { font-weight: bold; line-height: 1.1; }
        .yellow-text { color: var(--accent-yellow); }

        .admin-badge {
            background: rgba(0, 210, 255, 0.1);
            color: var(--accent-cyan);
            border: 1px solid var(--accent-cyan);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .main-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 20px;
            border: 1px solid #30363d;
        }

        .card-title { text-align: center; margin-bottom: 20px; }
        .calc-emoji { font-size: 1.8rem; color: var(--accent-yellow); }

        .input-container { margin-bottom: 15px; }
        .input-container label {
            display: block; font-size: 0.8rem;
            color: #8b949e; margin-bottom: 6px;
        }

        input, .time-input-box {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid #30363d;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .time-input-box { cursor: pointer; }

        .action-grid { display: flex; gap: 10px; margin-top: 25px; }
        .btn-calculate {
            flex: 2;
            background: linear-gradient(to right, #b4ec51, #429321);
            border: none; padding: 15px;
            border-radius: 10px; font-weight: bold; cursor: pointer;
        }

        .btn-reset {
            flex: 1; background: #21262d;
            color: white; border: none;
            border-radius: 10px; cursor: pointer;
        }

        .result-area h3 { text-align: center; margin: 30px 0 15px; color: var(--accent-cyan); }
        .grid-results { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .res-card {
            background: var(--card-bg);
            padding: 15px; border-radius: 12px;
            text-align: center; border: 1px solid #30363d;
        }

        .res-card p { margin: 0; font-size: 0.7rem; color: #8b949e; }
        .res-card span { display: block; margin-top: 5px; font-weight: bold; font-size: 1.1rem; }
        .highlight span { color: var(--accent-yellow); }
        .cyan-text span { color: var(--accent-cyan); }

        /* --- HISTORIQUE (VAOVAO) --- */
        .history-box {
            margin-top: 30px;
            padding: 15px;
            background: #161b22;
            border-radius: 12px;
            border: 1px dashed #30363d;
        }
        .history-title { color: var(--accent-yellow); font-size: 0.9rem; margin-bottom: 10px; }
        .history-item { 
            font-size: 0.8rem; padding: 5px 0; border-bottom: 1px solid #30363d;
            display: flex; justify-content: space-between;
        }

        /* Modal Time Picker */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.85);
            justify-content: center; align-items: center; z-index: 100;
        }

        .modal-box {
            background: white; color: #333;
            padding: 25px; border-radius: 20px;
            width: 280px; text-align: center;
        }

        .picker-inputs input {
            width: 50px; background: #f0f0f0;
            color: #333; text-align: center; padding: 8px;
        }

        .modal-actions { display: flex; justify-content: space-around; margin-top: 20px; }
        .modal-actions button { border: none; background: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="brand">
                <div class="diamond-icon"></div>
                <div class="brand-text"><span class="white-text">Blizzard-</span><br><span class="yellow-text">Imperial</span></div>
            </div>
            <button class="admin-badge">🛡️ Admin</button>
        </header>

        <main class="main-card">
            <div class="card-title"><span class="calc-emoji">🖩</span><h2>Calculateur de Prédiction</h2></div>

            <div class="input-container" onclick="openTimePicker()">
                <label>🕒 Heure de départ</label>
                <div class="time-input-box" id="display-time">08:55:39</div>
            </div>

            <div class="input-container">
                <label>Multiplicateur</label>
                <input type="number" id="multiplier" placeholder="Ex: 1.75">
            </div>

            <div class="input-container">
                <label>Décimal</label>
                <input type="text" id="decimal" value="8519041117">
            </div>

            <div class="action-grid">
                <button class="btn-calculate" onclick="startCalc()">CALCULER</button>
                <button class="btn-reset" onclick="reset()">Effacer</button>
            </div>
        </main>

        <section class="result-area">
            <h3>Résultat</h3>
            <div class="grid-results">
                <div class="res-card highlight"><p>PREDICTION</p><span id="res-prediction">--:--:--</span></div>
                <div class="res-card"><p>TEMPS RAJOUTÉ</p><span id="res-added">00:00:00</span></div>
                <div class="res-card cyan-text"><p>COTE MAX</p><span id="res-max">0.00</span></div>
                <div class="res-card cyan-text"><p>COTE MOYEN</p><span id="res-avg">0.00</span></div>
            </div>
        </section>

        <div class="history-box">
            <div class="history-title">📜 Historique</div>
            <div id="history-list"></div>
        </div>
    </div>

    <div id="time-modal" class="modal-overlay">
        <div class="modal-box">
            <h4>Définir l'heure</h4>
            <div class="picker-inputs">
                <input type="number" id="h" value="08"> : <input type="number" id="m" value="55"> : <input type="number" id="s" value="39">
            </div>
            <div class="modal-actions">
                <button onclick="closePicker()" style="color:red">Annuler</button>
                <button onclick="saveTime()" style="color:blue">Définir</button>
            </div>
        </div>
    </div>

    <script>
        /* --- JAVASCRIPT VOALOHANY (TSY NIOVA) --- */
        function openTimePicker() { document.getElementById('time-modal').style.display = 'flex'; }
        function closePicker() { document.getElementById('time-modal').style.display = 'none'; }
        
        function saveTime() {
            const time = document.getElementById('h').value.padStart(2,'0')+':'+document.getElementById('m').value.padStart(2,'0')+':'+document.getElementById('s').value.padStart(2,'0');
            document.getElementById('display-time').innerText = time;
            closePicker();
        }

        function startCalc() {
            const mult = document.getElementById('multiplier').value;
            if(!mult) return alert("Ampidiro ny Multiplicateur");

            // Sanda ohatra tahaka ilay teo aloha
            const res = "09:00:32";
            document.getElementById('res-prediction').innerText = res;
            document.getElementById('res-max').innerText = "45.00";

            // Ampiana ao amin'ny historique
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `<span>${document.getElementById('display-time').innerText}</span> ➔ <b>${res}</b>`;
            document.getElementById('history-list').prepend(item);
        }

        function reset() {
            document.getElementById('multiplier').value = '';
            document.getElementById('res-prediction').innerText = '--:--:--';
        }
    </script>
</body>
</html>
