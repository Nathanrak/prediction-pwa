<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Prediction Tool</title>
    <style>
        /* CSS: Endrika sy Loko */
        body {
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: linear-gradient(145deg, #161b22, #0d1117);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(138, 43, 226, 0.3);
            text-align: center;
            width: 350px;
            border: 1px solid #30363d;
        }

        h1 {
            font-size: 1.5rem;
            color: #a371f7;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .display-box {
            background-color: #010409;
            border: 2px solid #8a2be2;
            border-radius: 15px;
            padding: 40px 20px;
            margin-bottom: 25px;
            position: relative;
        }

        #predictionText {
            font-size: 3.5rem;
            font-weight: bold;
            color: #00ffcc;
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.6);
            margin: 0;
        }

        .btn-predict {
            background: linear-gradient(90deg, #8a2be2, #4b0082);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            box-shadow: 0 5px 15px rgba(138, 43, 226, 0.4);
        }

        .btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(138, 43, 226, 0.6);
            filter: brightness(1.2);
        }

        .btn-predict:active {
            transform: translateY(1px);
        }

        .history {
            margin-top: 25px;
            text-align: left;
        }

        .history h3 {
            font-size: 0.9rem;
            color: #8b949e;
            border-bottom: 1px dashed #30363d;
            padding-bottom: 5px;
        }

        #historyList {
            list-style: none;
            padding: 0;
            max-height: 100px;
            overflow-y: auto;
        }

        .history-item {
            display: inline-block;
            background: #21262d;
            padding: 5px 10px;
            border-radius: 5px;
            margin: 3px;
            font-size: 0.85rem;
            color: #00ffcc;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Aviator Predictor</h1>
    
    <div class="display-box">
        <p id="predictionText">1.00x</p>
    </div>

    <button class="btn-predict" onclick="getPrediction()">GET PREDICTION</button>

    <div class="history">
        <h3>Recent Results:</h3>
        <div id="historyList">
            </div>
    </div>
</div>

<script>
    /* JavaScript: Logic sy Algorithm tsotra */
    function getPrediction() {
        const display = document.getElementById("predictionText");
        const historyList = document.getElementById("historyList");

        // Manova ny lahatsoratra mandritra ny segondra vitsy (loading effect)
        display.innerText = "---";
        display.style.color = "#8b949e";

        setTimeout(() => {
            // Algorithm famoronana isa kisendrasendra
            // Afaka ovanao eto ny "Probability"
            let randomValue;
            let chance = Math.random();

            if (chance < 0.7) {
                // 70% chance hahazoana 1.00x - 2.50x
                randomValue = (Math.random() * (2.50 - 1.10) + 1.10).toFixed(2);
            } else if (chance < 0.95) {
                // 25% chance hahazoana 2.50x - 10.00x
                randomValue = (Math.random() * (10.00 - 2.51) + 2.51).toFixed(2);
            } else {
                // 5% chance hahazoana isa ambony be
                randomValue = (Math.random() * (50.00 - 10.01) + 10.01).toFixed(2);
            }

            // Mampiseho ny valiny
            display.innerText = randomValue + "x";
            display.style.color = "#00ffcc";

            // Ampiana ao amin'ny History
            const item = document.createElement("span");
            item.className = "history-item";
            item.innerText = randomValue + "x";
            
            // Ampidirina eo aloha foana ny vaovao
            if (historyList.firstChild) {
                historyList.insertBefore(item, historyList.firstChild);
            } else {
                historyList.appendChild(item);
            }

            // Tazonina ho 5 fotsiny ny tantara hita maso
            if (historyList.childNodes.length > 5) {
                historyList.removeChild(historyList.lastChild);
            }

        }, 800); // 0.8 segondra ny "loading"
    }
</script>

</body>
</html>
